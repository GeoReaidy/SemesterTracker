<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Semester tracker app logo</title>
<desc>A rounded square app icon with a purple-to-blue gradient background, featuring a stylized open book whose pages form a calendar grid, with a progress arc and a checkmark dot marking a completed day.</desc>

<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#5B5FEF"/>
<stop offset="100%" stop-color="#9B5DE5"/>
</linearGradient>
<linearGradient id="pageShade" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#FFFFFF"/>
<stop offset="100%" stop-color="#F1EEFF"/>
</linearGradient>
<linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#FFE08A"/>
<stop offset="100%" stop-color="#FFB05C"/>
</linearGradient>
</defs>

<rect x="0" y="0" width="512" height="512" rx="104" fill="url(#bg)"/>

<circle cx="256" cy="256" r="148" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="14"/>
<path d="M 256 108 A 148 148 0 1 1 130.5 326" fill="none" stroke="url(#arc)" stroke-width="14" stroke-linecap="round"/>

